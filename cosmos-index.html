<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cosmos News</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #020408;
    --surface: #080d14;
    --surface2: #0d1520;
    --border: rgba(0, 200, 255, 0.12);
    --accent: #00c8ff;
    --accent2: #7b2fff;
    --accent3: #ff6b35;
    --text: #e8f4f8;
    --muted: #5a7a8a;
    --glow: rgba(0, 200, 255, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── STARFIELD ── */
  #stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--d) ease-in-out infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: var(--min-op); transform: scale(1); }
    50% { opacity: 1; transform: scale(1.4); }
  }

  /* nebula */
  body::before {
    content: '';
    position: fixed;
    top: -20%;
    right: -10%;
    width: 60vw;
    height: 60vw;
    background: radial-gradient(ellipse, rgba(123,47,255,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -10%;
    left: -10%;
    width: 50vw;
    height: 50vw;
    background: radial-gradient(ellipse, rgba(0,200,255,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: relative;
    z-index: 10;
    padding: 28px 40px 20px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(2,4,8,0.98) 0%, transparent 100%);
    display: flex;
    align-items: center;
    gap: 20px;
    backdrop-filter: blur(10px);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 42px;
    height: 42px;
    position: relative;
  }
  .logo-icon svg { width: 100%; height: 100%; }

  .logo-text {
    font-family: 'Orbitron', monospace;
    font-size: 1.6rem;
    font-weight: 900;
    letter-spacing: 0.12em;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .logo-sub {
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 2px;
  }

  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .live-indicator {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .live-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #00ff88;
    box-shadow: 0 0 8px #00ff88;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  #clock {
    font-family: 'Orbitron', monospace;
    font-size: 0.8rem;
    color: var(--accent);
    letter-spacing: 0.1em;
  }

  /* ── NAV TABS ── */
  nav {
    position: relative;
    z-index: 10;
    padding: 0 40px;
    background: rgba(2,4,8,0.8);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  nav::-webkit-scrollbar { display: none; }

  .tab {
    padding: 14px 22px;
    font-family: 'Orbitron', monospace;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    border: none;
    background: none;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .tab:hover { color: var(--text); }
  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    text-shadow: 0 0 20px rgba(0,200,255,0.5);
  }
  .tab-emoji { font-size: 0.85rem; }

  /* ── MAIN ── */
  main {
    position: relative;
    z-index: 5;
    max-width: 1400px;
    margin: 0 auto;
    padding: 32px 40px 60px;
  }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }

  .grid .card:first-child {
    grid-column: 1 / 3;
  }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
    animation: fadeUp 0.4s ease both;
    display: flex;
    flex-direction: column;
  }
  .card:hover {
    transform: translateY(-4px);
    border-color: rgba(0,200,255,0.35);
    box-shadow: 0 0 30px rgba(0,200,255,0.1);
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-img-wrap {
    position: relative;
    aspect-ratio: 16/9;
    overflow: hidden;
    background: var(--surface2);
    flex-shrink: 0;
  }
  .grid .card:first-child .card-img-wrap {
    aspect-ratio: 21/9;
  }

  .card-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.4s;
  }
  .card:hover .card-img { transform: scale(1.05); }

  .card-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
    background: linear-gradient(135deg, var(--surface2), var(--bg));
  }

  .card-cat-badge {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(0,0,0,0.8);
    border: 1px solid var(--border);
    color: var(--accent);
    font-family: 'Orbitron', monospace;
    font-size: 0.55rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    padding: 3px 8px;
    text-transform: uppercase;
    backdrop-filter: blur(4px);
  }

  .card-body {
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex: 1;
  }

  .card-title {
    font-family: 'Orbitron', monospace;
    font-size: 0.78rem;
    font-weight: 700;
    line-height: 1.5;
    color: var(--text);
    letter-spacing: 0.02em;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .grid .card:first-child .card-title {
    font-size: 1rem;
    -webkit-line-clamp: 2;
  }

  .card-desc {
    font-size: 0.7rem;
    color: var(--muted);
    line-height: 1.6;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-meta {
    margin-top: auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }

  .card-source {
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-transform: uppercase;
  }

  .card-time {
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  /* ── SKELETON ── */
  .skeleton {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    animation: skeletonPulse 1.5s ease-in-out infinite;
  }
  @keyframes skeletonPulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }
  .sk-img { aspect-ratio: 16/9; background: var(--surface2); }
  .skeleton:first-child .sk-img { aspect-ratio: 21/9; }
  .sk-body { padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .sk-line { height: 10px; background: var(--surface2); border-radius: 2px; }
  .sk-line.w80 { width: 80%; }
  .sk-line.w60 { width: 60%; }
  .sk-line.w40 { width: 40%; }

  /* ── ERROR ── */
  .error-box {
    grid-column: 1 / -1;
    padding: 40px;
    text-align: center;
    border: 1px solid rgba(255,107,53,0.3);
    border-radius: 4px;
    background: rgba(255,107,53,0.05);
  }
  .error-box p { color: var(--muted); font-size: 0.75rem; letter-spacing: 0.05em; }
  .error-box code { color: var(--accent3); font-size: 0.7rem; }

  /* ── REFRESH BTN ── */
  .refresh-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Orbitron', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    padding: 8px 16px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  .refresh-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 15px rgba(0,200,255,0.15);
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {
    header { padding: 20px; }
    nav { padding: 0 20px; }
    main { padding: 20px; }
    .grid {
      grid-template-columns: repeat(2, 1fr);
    }
    .grid .card:first-child { grid-column: 1 / 3; }
  }
  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; }
    .grid .card:first-child { grid-column: 1; }
    header { flex-wrap: wrap; }
    .logo-text { font-size: 1.2rem; }
  }
</style>
</head>
<body>

<div id="stars"></div>

<header>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 42 42" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="21" cy="21" r="9" stroke="#00c8ff" stroke-width="1.5"/>
        <ellipse cx="21" cy="21" rx="20" ry="7" stroke="#7b2fff" stroke-width="1" opacity="0.7"/>
        <circle cx="21" cy="21" r="3" fill="#00c8ff"/>
        <circle cx="38" cy="10" r="1.5" fill="#ffffff" opacity="0.8"/>
        <circle cx="6" cy="32" r="1" fill="#7b2fff" opacity="0.9"/>
      </svg>
    </div>
    <div>
      <div class="logo-text">COSMOS</div>
      <div class="logo-sub">News Terminal</div>
    </div>
  </div>
  <div class="header-right">
    <div class="live-indicator">
      <span class="live-dot"></span>
      <span>Live</span>
    </div>
    <div id="clock">--:--:--</div>
    <button class="refresh-btn" onclick="reload()">⟳ Aggiorna</button>
  </div>
</header>

<nav id="nav"></nav>

<main>
  <div class="grid" id="grid"></div>
</main>

<script>
// ── CONFIG ──
const RSS2JSON = 'https://api.rss2json.com/v1/api.json?rss_url=';

const FEEDS = {
  all:    { label: 'Tutte',      emoji: '🌌', url: 'https://www.ansa.it/sito/notizie/topnews/topnews_rss.xml' },
  tech:   { label: 'Tech',       emoji: '🤖', url: 'https://www.ansa.it/canale_tecnologia/notizie/tecnologia_rss.xml' },
  sport:  { label: 'Sport',      emoji: '⚽', url: 'https://www.ansa.it/sito/notizie/sport/sport_rss.xml' },
  mondo:  { label: 'Mondo',      emoji: '🌍', url: 'https://www.ansa.it/sito/notizie/mondo/mondo_rss.xml' },
  sci:    { label: 'Scienza',    emoji: '🔭', url: 'https://www.ansa.it/canale_scienze_tecnologie/notizie/spazio_astronomia/spazio_astronomia_rss.xml' },
  cult:   { label: 'Cultura',    emoji: '🎬', url: 'https://www.ansa.it/sito/notizie/cultura/cinema/cinema_rss.xml' },
};

let currentCat = 'all';

// ── CLOCK ──
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent = `${h}:${m}:${s}`;
}
setInterval(updateClock, 1000);
updateClock();

// ── STARS ──
function buildStars() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 150; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2 + 0.5;
    const minOp = Math.random() * 0.3 + 0.1;
    s.style.cssText = `
      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      width:${size}px;
      height:${size}px;
      --d:${2 + Math.random()*4}s;
      --min-op:${minOp};
      animation-delay:${Math.random()*4}s;
    `;
    container.appendChild(s);
  }
}

// ── TABS ──
function buildTabs() {
  const nav = document.getElementById('nav');
  Object.entries(FEEDS).forEach(([key, f]) => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (key === currentCat ? ' active' : '');
    btn.innerHTML = `<span class="tab-emoji">${f.emoji}</span>${f.label}`;
    btn.onclick = () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      currentCat = key;
      loadNews(key);
    };
    nav.appendChild(btn);
  });
}

// ── SKELETONS ──
function showSkeletons() {
  const grid = document.getElementById('grid');
  grid.innerHTML = Array(6).fill(0).map(() => `
    <div class="skeleton">
      <div class="sk-img"></div>
      <div class="sk-body">
        <div class="sk-line w80"></div>
        <div class="sk-line w60"></div>
        <div class="sk-line w40"></div>
      </div>
    </div>
  `).join('');
}

// ── TIMEAGO ──
function timeAgo(dateStr) {
  if (!dateStr) return '';
  const diff = (Date.now() - new Date(dateStr)) / 1000;
  if (diff < 60) return 'ora';
  if (diff < 3600) return `${Math.floor(diff/60)}m fa`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h fa`;
  return `${Math.floor(diff/86400)}g fa`;
}

// ── RENDER ──
function renderCards(articles, cat) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const feed = FEEDS[cat];

  articles.forEach((a, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = `${i * 0.06}s`;
    card.onclick = () => window.open(a.link || a.url || '#', '_blank');

    const imgSrc = a.enclosure?.link || a.thumbnail || null;
    const imgHtml = imgSrc
      ? `<img class="card-img" src="${imgSrc}" alt="" loading="lazy" onerror="this.parentElement.innerHTML='<div class=card-placeholder>${feed.emoji}</div>'">`
      : `<div class="card-placeholder">${feed.emoji}</div>`;

    const desc = (a.description || '').replace(/<[^>]*>/g, '').trim().slice(0, 180);

    card.innerHTML = `
      <div class="card-img-wrap">
        ${imgHtml}
        <div class="card-cat-badge">${feed.emoji} ${feed.label}</div>
      </div>
      <div class="card-body">
        <div class="card-title">${a.title || 'Senza titolo'}</div>
        ${desc ? `<div class="card-desc">${desc}</div>` : ''}
        <div class="card-meta">
          <span class="card-source">ANSA</span>
          <span class="card-time">${timeAgo(a.pubDate)}</span>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

// ── LOAD NEWS ──
async function loadNews(cat) {
  showSkeletons();
  const feed = FEEDS[cat];
  try {
    const url = `${RSS2JSON}${encodeURIComponent(feed.url)}&count=6&api_key=`;
    const res = await fetch(url);
    const data = await res.json();
    if (data.status !== 'ok' || !data.items?.length) throw new Error(data.message || 'Feed non disponibile');
    renderCards(data.items.slice(0, 6), cat);
  } catch(e) {
    document.getElementById('grid').innerHTML = `
      <div class="error-box">
        <p>⚠ Impossibile caricare le notizie</p>
        <code>${e.message}</code>
        <br><br>
        <button class="refresh-btn" onclick="loadNews('${cat}')">↺ Riprova</button>
      </div>
    `;
  }
}

function reload() {
  loadNews(currentCat);
}

// ── INIT ──
buildStars();
buildTabs();
loadNews(currentCat);
</script>
</body>
</html>
